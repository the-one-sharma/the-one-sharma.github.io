<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b0b0d"/>
  <!-- Subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#22202e" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#22202e" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#22202e" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#22202e" stroke-width="1"/>
  <!-- Background glow -->
  <radialGradient id="g1" cx="20%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#5b8dee" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#5b8dee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g2" cx="80%" cy="100%" r="55%">
    <stop offset="0%" stop-color="#1fd47a" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#1fd47a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <!-- Logo mark -->
  <rect x="90" y="80" width="56" height="56" rx="14" fill="#131317" stroke="#36344a" stroke-width="1.5"/>
  <path d="M103 122 L115 106 L124 112 L138 100" stroke="#1fd47a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="138" cy="100" r="3.5" fill="#1fd47a"/>
  <!-- Brand name -->
  <text x="162" y="120" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="32" font-weight="700" fill="#eceaf4" letter-spacing="-1">Econ</text>
  <text x="248" y="120" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="32" font-weight="700" fill="#1fd47a" letter-spacing="-1">Cascade</text>
  <!-- Eyebrow -->
  <rect x="90" y="175" width="220" height="28" rx="14" fill="rgba(91,141,238,0.15)" stroke="rgba(91,141,238,0.3)" stroke-width="1"/>
  <circle cx="108" cy="189" r="4" fill="#1fd47a"/>
  <text x="122" y="194" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#5b8dee" letter-spacing="1.5">AP MACRO · AP MICRO · ECONBOWL</text>
  <!-- Headline -->
  <text x="90" y="285" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="64" font-weight="800" fill="#eceaf4" letter-spacing="-2">Shock the economy.</text>
  <text x="90" y="365" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="64" font-weight="800" fill="#1fd47a" letter-spacing="-2">Watch everything move.</text>
  <!-- Subtext -->
  <text x="90" y="420" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" fill="#9896aa">62 economic shocks · 26 connected variables · 15 live graph models</text>
  <!-- Stats row -->
  <rect x="90" y="460" width="160" height="80" rx="12" fill="#131317" stroke="#36344a" stroke-width="1"/>
  <text x="170" y="502" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="#eceaf4" text-anchor="middle" letter-spacing="-1">62</text>
  <text x="170" y="526" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#565470" text-anchor="middle" letter-spacing="1">SHOCKS</text>
  <rect x="270" y="460" width="160" height="80" rx="12" fill="#131317" stroke="#36344a" stroke-width="1"/>
  <text x="350" y="502" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="#eceaf4" text-anchor="middle" letter-spacing="-1">26</text>
  <text x="350" y="526" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#565470" text-anchor="middle" letter-spacing="1">VARIABLES</text>
  <rect x="450" y="460" width="160" height="80" rx="12" fill="#131317" stroke="#36344a" stroke-width="1"/>
  <text x="530" y="502" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="#eceaf4" text-anchor="middle" letter-spacing="-1">15</text>
  <text x="530" y="526" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#565470" text-anchor="middle" letter-spacing="1">GRAPH MODELS</text>
  <!-- Chart decoration right side -->
  <path d="M800 420 L870 300 L940 360 L1010 220 L1080 280 L1110 200" stroke="#1fd47a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <circle cx="1110" cy="200" r="6" fill="#1fd47a" opacity="0.8"/>
  <path d="M800 420 L870 380 L940 400 L1010 350 L1080 370 L1110 340" stroke="#ff4060" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" stroke-dasharray="8 4"/>
  <!-- URL -->
  <text x="1110" y="590" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" fill="#565470" text-anchor="end" letter-spacing=".5">econcascade.github.io/econcascade</text>
</svg>
